name: Cleanup preview environment

on:
  pull_request:
    types: [closed]
  delete:

jobs:
  cleanup:
    if: github.event_name == 'pull_request' || github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_WORKER_NAME: kino
      CONVEX_MANAGEMENT_TOKEN: ${{ secrets.CONVEX_MANAGEMENT_TOKEN }}
      CONVEX_TEAM_SLUG: ${{ vars.CONVEX_TEAM_SLUG || 'nate-dunn' }}
      CONVEX_PROJECT_SLUG: ${{ vars.CONVEX_PROJECT_SLUG || 'kino' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve preview names
        id: preview
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            branch="${{ github.event.pull_request.head.ref }}"
          else
            branch="${{ github.event.ref }}"
          fi

          convex_preview="$(sh scripts/preview-name.sh "$branch" 48)"
          cloudflare_alias="$(sh scripts/preview-name.sh "$branch" 40)"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "convex_preview=$convex_preview" >> "$GITHUB_OUTPUT"
          echo "cloudflare_alias=$cloudflare_alias" >> "$GITHUB_OUTPUT"

      - name: Delete Cloudflare preview Worker versions
        run: node scripts/cleanup-cloudflare-preview.mjs "${{ steps.preview.outputs.cloudflare_alias }}"

      - name: Delete Convex preview deployment
        run: node scripts/cleanup-convex-preview.mjs "${{ steps.preview.outputs.convex_preview }}"
